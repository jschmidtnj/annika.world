backend:
  name: github
  repo: jschmidtnj/annika.world
  branch: main

site_url: https://annika.world
display_url: https://annika.world

locale: en
media_folder: ''

collections:
  - name: pages
    label: Pages
    media_folder: ../assets
    public_folder: ../assets
    files:
      - label: "Art Page (Old)"
        name: "art"
        file: "web/content/pages/art.md"
        fields:
          - name: images
            label: Images
            widget: list
            fields:
              - name: caption
                label: Caption
                widget: string
              - name: showCaption
                label: Show Caption
                widget: boolean
                default: true
              - name: image
                label: Image
                widget: image
              - name: year
                label: Year
                widget: number
                value_type: int
                default: 2026
              - name: width
                label: Width
                widget: number
                value_type: float
                min: 0
                max: 12
                default: 3

      - label: "Material Page"
        name: "material"
        file: "web/content/pages/material.md"
        fields:
          - name: images
            label: Images
            widget: list
            fields:
              - name: caption
                label: Caption
                widget: string
              - name: showCaption
                label: Show Caption
                widget: boolean
                default: true
              - name: image
                label: Image
                widget: image
              - name: year
                label: Year
                widget: number
                value_type: int
                default: 2026
              - name: column
                label: Column
                widget: number
                value_type: int
                min: 1
                max: 10
                default: 1

      - label: "Ecosystems Page"
        name: "ecosystems"
        file: "web/content/pages/ecosystems.md"
        fields:
          - name: ecosystems
            label: Ecosystems
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: description
                label: Description
                widget: markdown
              - name: caption
                label: Caption
                widget: string
              - name: column
                label: Column
                widget: number
                value_type: int
                min: 1
                max: 10
                default: 1
              - name: images
                label: Images
                widget: list
                fields:
                  - name: image
                    label: Image
                    widget: image
                  - name: isThumbnail
                    label: Is Thumbnail
                    widget: boolean
                    default: false
                  - name: column
                    label: Column (use this or width)
                    widget: number
                    value_type: int
                    min: 1
                    max: 10
                    default: 1

      - label: "Experiments Page"
        name: "experiments"
        file: "web/content/pages/experiments.md"
        fields:
          - name: images
            label: Images
            widget: list
            fields:
              - name: caption
                label: Caption
                widget: string
              - name: showCaption
                label: Show Caption
                widget: boolean
                default: true
              - name: image
                label: Image
                widget: image
              - name: year
                label: Year
                widget: number
                value_type: int
                default: 2026
              - name: column
                label: Column
                widget: number
                value_type: int
                min: 1
                max: 10
                default: 1

      - label: "Series Page"
        name: "series"
        file: "web/content/pages/series.md"
        fields:
          - name: series
            label: Series
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: description
                label: Description
                widget: markdown
              - name: caption
                label: Caption
                widget: string
              - name: inPortfolio
                label: In Portfolio (yes or no)
                widget: boolean
                default: false
              - name: column
                label: Column
                widget: number
                value_type: int
                min: 1
                max: 10
                default: 1
              - name: images
                label: Images
                widget: list
                fields:
                  - name: image
                    label: Image
                    widget: image
                  - name: isThumbnail
                    label: Is Thumbnail
                    widget: boolean
                    default: false
                  - name: column
                    label: Column (use this or width)
                    widget: number
                    value_type: int
                    min: 1
                    max: 10
                    default: 1

      - label: "Portfolio Page"
        name: "portfolio"
        file: "web/content/pages/portfolio.md"
        fields:
          - name: years
            label: Years
            widget: list
            fields:
              - name: year
                label: Year
                widget: number
                value_type: int
                min: 2000
                max: 3000
              - name: description
                label: Description
                widget: markdown
              - name: images
                label: Images
                widget: list
                fields:
                  - name: image
                    label: Image
                    widget: image
                  - name: column
                    label: Column (use this or width)
                    widget: number
                    value_type: int
                    min: 1
                    max: 10
                    default: 1
          - name: projects
            label: Projects
            widget: list
            fields:
              - name: title
                label: Title
                widget: string
              - name: description
                label: Description
                widget: markdown
              - name: caption
                label: Caption
                widget: string
              - name: images
                label: Images
                widget: list
                fields:
                  - name: image
                    label: Image
                    widget: image
                  - name: isThumbnail
                    label: Is Thumbnail
                    widget: boolean
                    default: false

      - label: "Tattoo Page"
        name: "tattoo"
        file: "web/content/pages/tattoo.md"
        fields:
          - name: description
            label: Description
            widget: markdown
          - name: images
            label: Images
            widget: list
            fields:
              - name: caption
                label: Caption
                widget: string
              - name: showCaption
                label: Show Caption
                widget: boolean
                default: true
              - name: image
                label: Image
                widget: image
              - name: year
                label: Year
                widget: number
                value_type: int
                default: 2026
              - name: width
                label: Width
                widget: number
                value_type: float
                min: 0
                max: 12
                default: 0

      - label: "About Page"
        name: "about"
        file: "web/content/pages/about.md"
        fields:
          - name: image
            label: Image
            widget: image
          - name: biography
            label: Biography
            widget: markdown
          - name: education
            label: Education
            widget: markdown
          - name: awards
            label: Awards
            widget: markdown
          - name: images
            label: Images
            widget: list
            fields:
              - name: caption
                label: Caption
                widget: string
              - name: showCaption
                label: Show Caption
                widget: boolean
                default: true
              - name: image
                label: Image
                widget: image
              - name: year
                label: Year
                widget: number
                value_type: int
                default: 2026
              - name: width
                label: Width
                widget: number
                value_type: float
                min: 0
                max: 12
                default: 3

  - name: uploads
    label: Uploads
    label_singular: Upload
    media_folder: ../../static
    public_folder: ../../static
    files:
      - label: "Reel"
        name: "reel"
        file: "web/content/uploads/reel.md"
        fields:
          - label: "Video"
            name: "video"
            widget: "file"
            default: "web/static/reel.mp4"
            media_library:
              allow_multiple: false
              choose_url: false
      - label: "Reel 2"
        name: "reel2"
        file: "web/content/uploads/reel2.md"
        fields:
          - label: "Video"
            name: "video"
            widget: "file"
            default: "web/static/reel2.mp4"
            media_library:
              allow_multiple: false
              choose_url: false
